# This is a basic workflow to help you get started with Actions

name: Check and Echo

# Controls when the workflow will run
on:
  workflow_dispatch

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  checking:
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      # Runs a single command using the runners shell
      - name: Echo GITHUB_WORKSPACE
        run: echo "{{ $GITHUB_WORKSPACE }}"

      - name: Echo github
        run: echo "${{ toJson(github) }}"
        
      - name: List files in the workspace
        run: ls $GITHUB_WORKSPACE

      - name: Echo content of a specific file
        run: cat $GITHUB_WORKSPACE/readSIGAA.ipynb
        
      - name: Echo log
        run: echo "::debug::Log de debug"

      - name: Setting a notice message
        run: echo "::notice file=app.js,line=1,col=5,endColumn=7,title=Erro grave::Missing semicolon"
